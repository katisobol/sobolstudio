---
layout: default
---
<article class="portfolio-case">
  <h1>{{ page.title }}</h1>
  <p class="date">{{ page.date | date: "%d.%m.%Y" }}</p>

  {% if page.images %}
    <div class="gallery">
      {% for image in page.images %}
        <img src="{{ image | relative_url }}" alt="">
      {% endfor %}
    </div>
  {% endif %}

  <div class="content">
    {{ content }}
  </div>
</article>
