---
layout: default
---

<main class="padding">
  <h1
      {% if page.cover %}
      class="cover" style="background: url({{ page.cover | relative_url }})"
      {% elsif page.thumbnail %}
      class="cover" style="background: url({{ page.thumbnail | relative_url }})"
      {% endif %}
      >{{ page.title }}</h1>
  <p class="side" style="color: slategray">{{ page.date | date: "%d.%m.%Y" }}</p>

  {{ content }}


{% if page.images %}
<div id="gallery">
  {% for image in page.images %}
  <img src="{{ image | relative_url }}" alt="" />
  {% endfor %}
</div>
{% endif %}
</main>
<aside class="portfolio">
  <div class="card"><p>Смотрите также:</p></div>
  {% include portfolio.html %}
</aside>
