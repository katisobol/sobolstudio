---
layout: default
---


  <h1>{{ page.title }}</h1>
  <p class="side" style="color: slategray">{{ page.date | date: "%d.%m.%Y" }}</p>

  {{ content }}


{% if page.images %}
<div id="gallery">
  {% for image in page.images %}
  <img src="{{ image | relative_url }}" alt="" />
  {% endfor %}
</div>
{% endif %}
