---
layout: default
---

<main>

  <h1
      {% if page.cover %}
      class="cover" style="background: url({{ page.cover | relative_url }}) center"
      {% elsif page.thumbnail %}
      class="cover" style="background: url({{ page.thumbnail | relative_url }})"
      {% endif %}
      >{{ page.title }}</h1>

  <time class="side-text" datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%d.%m.%Y" }}</time>



{% if page.images %}
<div class="gallery white">
  {% for image in page.images %}
  <img src="{{ image | relative_url }}" alt="" />
  {% endfor %}
</div>
{% endif %}

  <article>
    {{ content }}
  </article>

</main>

{% if page.tgID %}
  <section aria-label="Комментарии" aria-live="polite" class="comments-section white">
    <h2 class="side-text">Обсуждение</h2>
    <div class="tg-link-wrapper"><a class="social tg" href="https://t.me/katisobol"></a></div>
    <script
      async
      src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-discussion="katisobol/{{ page.tgID }}"
      data-comments-limit="15"
      data-color="194cb3"
      data-dark-color="1a1a1a"></script>
  </section>
{% endif %}

<aside class="portfolio">
  <div class="portfolio-card"><p>Смотрите также:</p></div>
  {% include portfolio.html %}
</aside>
