<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% if page.title %}{{ page.title }} | {% endif %}Лаборатория визуальной коммуникации</title>


        {% if page.description %}
        <meta name="description" content="{{ page.description | strip_html | normalize_whitespace }}">
        <meta property="og:description" content="{{ page.description | strip_html | normalize_whitespace }}" />
        {% elsif page.excerpt %}
        <meta name="description" content="{{ page.excerpt | strip_html | normalize_whitespace }}">
        <meta property="og:description" content="{{ page.excerpt | strip_html | normalize_whitespace }}" />
        {% endif %}

        <meta property="og:image" content="{{
            page.og_image
            | default: page.cover
            | default: '/assets/img/page/meta_preview.jpg'
            | relative_url
        }}" />

        <link rel="icon" type="image/x-icon" href="{% if page.favicon %} {{ page.favicon }} {% else %}https://katisobol.github.io/sobolstudio/Kc_logo_full.svg"{% endif %} />

        <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
        {% if page.extra_css %}
            {% for css in page.extra_css %}
        <link rel="stylesheet" href="{{ css | relative_url }}">
            {% endfor %}
        {% endif %}

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
        href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet" />

        <script src="https://katisobol.github.io/sobolstudio/scripts/addAssets/script.js"></script>
    </head>
    <body {% if page.extra_css %}
            {% assign css_classes = "" %}
                {% for css_file in page.extra_css %}
                    {% assign file_name = css_file | split: '/' | last | split: '.' | first %}
                    {% capture css_classes %}{{ css_classes }} {{ file_name }}{% endcapture %}
                {% endfor %}
           class="{{ css_classes | strip }}"
          {% endif %} >


        {% include icons.html %}
        {% include header.html %}
        {{ content }}
        {% include footer.html %}

<!-- Скрипт Bigger Picture -->
<script src="https://cdn.jsdelivr.net/npm/bigger-picture@1.1.12/dist/bigger-picture.umd.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const bp = BiggerPicture({
      target: document.body,
    });
  });
</script>

    </body>
</html>
