      <text class="cls-12" transform="translate(197.45 196.93)"><tspan class="cls-13" x="0" y="0">Тепер</tspan><tspan class="cls-2" x="34.01" y="0">ь </tspan><tspan class="cls-24" x="47.08" y="0">понятно</tspan><tspan class="cls-2" x="94.69" y="0">, </tspan><tspan class="cls-24" x="107.77" y="0">почем</tspan><tspan class="cls-8" x="141.78" y="0">у </tspan><tspan class="cls-13" x="154.85" y="0">серве</tspan><tspan class="cls-2" x="188.86" y="0">р </tspan><tspan class="cls-13" x="0" y="16.2">иногд</tspan><tspan class="cls-2" x="34.01" y="16.2">а </tspan><tspan class="cls-24" x="47.08" y="16.2">зависает</tspan><tspan class="cls-2" x="101.5" y="16.2">. </tspan><tspan class="cls-13" x="114.57" y="16.2">Добави</tspan><tspan class="cls-2" x="155.38" y="16.2">л </tspan><tspan class="cls-13" x="168.46" y="16.2">лог</tspan><tspan class="cls-2" x="188.86" y="16.2">и </tspan><tspan class="cls-13" x="0" y="32.4">п</tspan><tspan class="cls-2" x="6.8" y="32.4">о </tspan><tspan class="cls-13" x="19.88" y="32.4">узки</tspan><tspan class="cls-8" x="47.08" y="32.4">м </tspan><tspan class="cls-13" x="60.16" y="32.4">места</tspan><tspan class="cls-2" x="94.17" y="32.4">м</tspan></text>
