---
layout: default
title: Портфолио
---
<h1>Портфолио</h1>
<div class="portfolio-grid">
  {% for case in site.portfolio reversed %}
    <a href="{{ case.url | relative_url }}" class="portfolio-item">
      <h2>{{ case.title }}</h2>
      <p>{{ case.excerpt | default: case.description }}</p>
    </a>
  {% endfor %}
</div>
