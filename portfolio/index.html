---
layout: default
title: Портфолио
extra_css:
  - /assets/css/portfolio.css
---

<h1 class="side">Портфолио</h1>
{% for case in site.portfolio reversed %}
<a
  href="{{ case.url | relative_url }}"
  {% if case.size %}
   class="size{{ case.size }}"
  {% endif %}
  {% if case.thumbnail %}
  style='background:
    url("{{ case.thumbnail | relative_url }}") center/cover;'
  {% endif %}
  >
  <p>{{ case.description }}</p>

  {% if case.keyvisual %}
  <img src="{{ case.keyvisual | relative_url }}" alt="{{ case.title }}">
  {% endif %}
</a>
{% endfor %}
